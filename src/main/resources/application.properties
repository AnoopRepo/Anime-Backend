spring.application.name=demo
server.port=${PORT:8080}

# MongoDB
spring.data.mongodb.uri=${MONGO_DB_URI}
spring.data.mongodb.database=AnimeBlogs

# CORS
spring.webmvc.cors.enabled=true
spring.webmvc.cors.allowed-origins=${CORS_ORIGIN:*}
spring.webmvc.cors.allowed-methods=*
spring.webmvc.cors.allowed-headers=*
spring.webmvc.cors.allow-credentials=true

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
